version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env  # Securely injects GOOGLE_API_KEY into the container

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      # Directs Streamlit to backend service resolution on Docker network
      - API_URL=http://backend:8000