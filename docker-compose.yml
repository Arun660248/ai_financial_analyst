version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env  # This securely injects your GOOGLE_API_KEY into the container

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      # This tells Streamlit exactly where to find the backend on the Docker network
      - API_URL=http://backend:8000